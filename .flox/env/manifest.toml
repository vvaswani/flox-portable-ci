schema-version = "1.12.0"

[install]
python3.pkg-path = "python3"
postgresql.pkg-path = "postgresql"

[vars]
POSTGRES_USER = "app_user"
POSTGRES_PASSWORD = "app_secret"
POSTGRES_DB = "app_db"
POSTGRES_HOST = "127.0.0.1"
POSTGRES_PORT = "5432"
DATABASE_URL = "postgresql://app_user:app_secret@127.0.0.1:5432/app_db"


[hook]
on-activate = """
  # Autogenerated by Flox

  # Setup a Python virtual environment

  export PYTHON_DIR="$FLOX_ENV_CACHE/python"
  if [ ! -d "$PYTHON_DIR" ]; then
    echo "Creating python virtual environment in $PYTHON_DIR"
    python -m venv "$PYTHON_DIR"
  fi

  # Quietly activate venv and install packages in a subshell so
  # that the venv can be freshly activated in the profile section.
  (
    source "$PYTHON_DIR/bin/activate"
    pip install -r "$FLOX_ENV_PROJECT/requirements.txt"
  )

  # End autogenerated by Flox
"""


## Profile script ----------------------------------------------------
## ... sourced by _your shell_ when you run 'flox activate'.
## -------------------------------------------------------------------
[profile]
bash = """
  # Autogenerated by Flox

  echo "Activating python virtual environment" >&2
  source "$PYTHON_DIR/bin/activate"

  # End autogenerated by Flox
"""
fish = """
  # Autogenerated by Flox

  echo "Activating python virtual environment" >&2
  source "$PYTHON_DIR/bin/activate.fish"

  # End autogenerated by Flox
"""
tcsh = """
  # Autogenerated by Flox

  echo "Activating python virtual environment" >&2
  source "$PYTHON_DIR/bin/activate.csh"

  # End autogenerated by Flox
"""
zsh = """
  # Autogenerated by Flox

  echo "Activating python virtual environment" >&2
  source "$PYTHON_DIR/bin/activate"

  # End autogenerated by Flox
"""

[services.postgres]
command = """
export PGDATA="$(pwd)/.flox/postgres"
export PGSOCKET="$(pwd)/.flox/run"

mkdir -p "$PGDATA"
mkdir -p "$PGSOCKET"

if [ ! -f "$PGDATA/PG_VERSION" ]; then
  initdb --auth=trust --username="$POSTGRES_USER" -D "$PGDATA"
fi

postgres \
  -D "$PGDATA" \
  -h 127.0.0.1 \
  -k "$PGSOCKET" \
  -p 5432 &

until pg_isready -h 127.0.0.1 -p 5432; do
  sleep 1
done

if ! psql -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '$POSTGRES_DB'" | grep -q 1; then
  createdb -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" "$POSTGRES_DB"
fi

wait $!
"""
